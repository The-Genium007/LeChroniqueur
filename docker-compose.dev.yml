# docker-compose.dev.yml — Environnement de développement local
# Le bot tourne en natif (npm run dev), ce compose fournit les services externes.
#
# Usage :
#   cp .env.dev.example .env.dev   # puis remplir les clés API
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
#   npm run dev

name: lechroniqueur

services:

  # ─── SearXNG (moteur de recherche) ───
  searxng:
    image: searxng/searxng:latest
    container_name: lechroniqueur-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - dev

  # ─── Postiz (publication réseaux sociaux) ───
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: lechroniqueur-postiz
    restart: unless-stopped
    depends_on:
      postiz-db:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    ports:
      - "5100:5000"
    environment:
      DATABASE_URL: "postgresql://${POSTIZ_DB_USER}:${POSTIZ_DB_PASS}@postiz-db:5432/${POSTIZ_DB_NAME}"
      REDIS_URL: "redis://postiz-redis:6379"
      JWT_SECRET: "${POSTIZ_JWT}"
      MAIN_URL: "http://localhost:5100"
      FRONTEND_URL: "http://localhost:5100"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5100/api"
      BACKEND_INTERNAL_URL: "http://postiz:5000"
      IS_GENERAL: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      DISABLE_REGISTRATION: "false"
    volumes:
      - postiz_uploads:/uploads
    networks:
      - dev

  # ─── PostgreSQL (BDD Postiz) ───
  postiz-db:
    image: postgres:17-alpine
    container_name: lechroniqueur-postiz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTIZ_DB_USER}"
      POSTGRES_PASSWORD: "${POSTIZ_DB_PASS}"
      POSTGRES_DB: "${POSTIZ_DB_NAME}"
    volumes:
      - postiz_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTIZ_DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis (cache Postiz) ───
  postiz-redis:
    image: redis:7-alpine
    container_name: lechroniqueur-postiz-redis
    restart: unless-stopped
    volumes:
      - postiz_redis:/data
    ports:
      - "6379:6379"
    networks:
      - dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postiz_uploads:
  postiz_db:
  postiz_redis:

networks:
  dev:
    driver: bridge
